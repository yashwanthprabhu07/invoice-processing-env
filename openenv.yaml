name: invoice-processing-env
version: 1.0.0
description: AI environment for invoice extraction, validation, and fraud detection

entry_point: env:InvoiceEnv

observation_space:
  type: object
  properties:
    invoice_text: string
    extracted_fields: object
    validation_errors: array
    fraud_detected: boolean
    step_count: integer
    goal: string

action_space:
  type: object
  properties:
    action_type: string
    field_name: string
    value: string

reward_range: [-2, 2.59]

max_steps: 10
